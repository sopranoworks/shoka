# Apache httpd configuration for the B-61 OAuth e2e harness.
#
# Mirrors the production posture Cloudflare -> reverse proxy -> Shoka:
#   - TLS terminated HERE (mod_ssl) with the local-CA cert.
#   - plain HTTP forwarded to the shoka container (mod_proxy / mod_proxy_http).
#   - the real proxy headers (Host, X-Forwarded-For/-Host/-Proto) are sent on.
#
# Two name-based vhosts share the one cert (SANs shoka.test + client.test):
#   - shoka.test  : reverse-proxy the OAuth + MCP surface to http://shoka:8082
#   - client.test : serve the client's CIMD metadata document (static)
#
# Apache (httpd/apache2 + mod_proxy/mod_proxy_http/mod_ssl) is mandated by the
# directive; no other proxy is permitted.

ServerName shoka.test

Listen 443
LoadModule ssl_module modules/mod_ssl.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule headers_module modules/mod_headers.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so

SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1

# --- shoka.test : the public OAuth + MCP origin -----------------------------
<VirtualHost *:443>
    ServerName shoka.test

    SSLEngine on
    SSLCertificateFile      /usr/local/apache2/conf/tls/server.crt
    SSLCertificateKeyFile   /usr/local/apache2/conf/tls/server.key

    # Mirror Cloudflare: pass the public Host through and stamp the forwarded
    # headers Shoka would see behind the edge. mod_proxy_http already adds
    # X-Forwarded-For and X-Forwarded-Host; X-Forwarded-Proto we set explicitly
    # because TLS terminates here and Shoka speaks plain HTTP upstream.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"

    # Do not let the proxy buffer the response: the MCP Streamable-HTTP transport
    # may stream (SSE) the initialize/tool responses, and a buffering proxy would
    # stall the stream. flushpackets=on + proxy-sendchunked forward bytes as they
    # arrive, matching an SSE-aware edge.
    SetEnv proxy-sendchunked 1
    ProxyPass        "/" "http://shoka:8082/" flushpackets=on
    ProxyPassReverse "/" "http://shoka:8082/"
</VirtualHost>

# --- client.test : the client's self-hosted CIMD metadata document ----------
<VirtualHost *:443>
    ServerName client.test

    SSLEngine on
    SSLCertificateFile      /usr/local/apache2/conf/tls/server.crt
    SSLCertificateKeyFile   /usr/local/apache2/conf/tls/server.key

    DocumentRoot "/usr/local/apache2/htdocs/client"
    <Directory "/usr/local/apache2/htdocs/client">
        Require all granted
    </Directory>

    # The CIMD document is application/json.
    <Files "client.json">
        ForceType application/json
    </Files>
</VirtualHost>
