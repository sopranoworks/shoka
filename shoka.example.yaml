# Shoka example configuration.
#
# Copy to shoka.yaml (or pass via --config) and adjust as needed:
#     ./shoka --config shoka.example.yaml
#
# REQUIRED fields: server.http.listen, server.mcp.listen, storage.base_dir.
# Everything else is optional.

server:
  # Human-facing web UI + WebSocket endpoints (/, /ws/ui, /drafts/...).
  http:
    listen: ":8080"
    external_url: "http://localhost:8080"   # optional; reported by the get_server_info tool
    tls:
      enabled: false
      # cert_file: "/path/to/cert.pem"
      # key_file: "/path/to/key.pem"

  # MCP endpoint (Streamable HTTP, served at /mcp) consumed by Claude clients.
  #
  # Shoka runs the MCP transport as up to two instances over one shared worker
  # layer, selected by PRESENCE of a `listen` address. At least one MUST be set
  # (a server with no MCP transport is invalid and fails to start):
  #   - plain.listen set  → open the plain (normal/internal) transport
  #   - oauth.listen set  → open the OAuth (external) transport
  #   - both set          → open both
  #
  # Shoka terminates NO TLS by design (it avoids the certificate lifecycle).
  # Put BOTH ports behind an external TLS-terminating reverse proxy (nginx, etc.);
  # there is no `tls` block here. See README / docs/OPERATIONS.md ("TLS").
  mcp:
    # Plain transport — normal/internal. Register with:
    #   claude mcp add --transport http shoka http://localhost:8081/mcp
    plain:
      listen: ":8081"
      external_url: "http://localhost:8081"   # optional
      # bearer_auth off (default) = unauthenticated — loopback/internal use ONLY.
      # bearer_auth on = require `Authorization: Bearer <token>` validated against
      #   server.auth.tokens (the API-Token path). MUST be behind a TLS proxy, or
      #   the token travels in cleartext.
      bearer_auth: false

    # OAuth transport — external entry, PURELY OAuth (B-39). Omit the whole block
    # (no listen) to run plain-only. Bearer/static-token auth is NOT accepted here
    # by design. OAuth requires HTTPS, so this port also sits behind the TLS proxy.
    oauth:
      # listen: ":8082"
      # external_url: "https://your-public-origin"   # public origin behind the proxy
      #
      # Trusted domains, per-domain consent, and per-domain token lifetimes are NO LONGER
      # configured here (B-71 Stage 2e). They are managed in the web UI (Settings → OAuth):
      # add a trusted domain, set its consent secret, and edit its TTLs. The settings live in
      # the dynamic domain store, which is the sole runtime source of trust/consent/TTL.
      #
      # MIGRATION: the former keys `consent_credential` and `trusted_client_metadata_domains`
      # are DEPRECATED but still parse — on first start of a not-yet-seeded deployment they are
      # consumed ONCE to seed the store (so an upgrade is never stranded), then ignored. A
      # startup warning flags their presence; remove them from your config once the domains
      # appear in the UI. A fresh install configures everything via the UI from the start.
      #
      # Token lifetimes (optional; finite defaults: access 1h, refresh 2160h=90d,
      # code 1m). 0/unset/negative is NOT "forever" — it resolves to the finite
      # default (B-71 Stage 5 no-indefinite floor). Refresh rotates on every use, so
      # an actively-used connection never expires; the value is the idle timeout.
      # access_token_ttl: "1h"
      # refresh_token_ttl: "2160h"
      # authorization_code_ttl: "1m"
      # Client-registration posture advertised in the AS metadata (B-63). One of:
      #   cimd (default) — advertise client_id_metadata_document_supported, NO
      #                    registration_endpoint. Claude selects CIMD.
      #   dcr            — advertise registration_endpoint (RFC 7591) and WITHHOLD the
      #                    CIMD signal, so Claude performs Dynamic Client Registration
      #                    (POSTs its metadata to /register). The two CANNOT both be
      #                    advertised: while the CIMD signal is present Claude skips DCR.
      # In both modes the AS also advertises the CONFIDENTIAL client auth methods
      # (token_endpoint_auth_methods_supported: none + client_secret_basic +
      # client_secret_post; B-71 Stage 3) — see the confidential-client note below.
      # Flip this and re-test the live claude.ai connect each way; no rebuild needed.
      # registration_mode: "cimd"
      #
      # CONFIDENTIAL pre-issued clients (Client ID + Secret; B-71 Stage 3) are NOT configured
      # here either — the operator issues them from the web UI (Settings → OAuth, super-user
      # only): pick a scope + a finite expiry; the secret is shown ONCE (stored hashed) and the
      # client authenticates at /token with the secret IN ADDITION to PKCE.
      #
      # The operator's own "Generate CLI token" (self-issued) likewise picks a per-issuance
      # FINITE expiry in the UI (B-71 Stage 4) — no indefinite option anywhere.

  # Structured logging. Optional — omit the whole block for info/text on stderr.
  #
  # `output` selects WHERE log output goes (the destination), not just its shape:
  #   stderr  (default) — one shared sink for every subsystem; capture it with a
  #                       service manager (journald/launchd) or a shell redirect.
  #   file              — a bounded log file (see `file:` below). Never grows
  #                       without limit: it rotates on size AND, by default, at
  #                       least once per day.
  # `level`/`format` apply to whichever destination is selected.
  log:
    level: "info"     # error | warn | info | debug
    format: "text"    # text | json
    output: "stderr"  # stderr (default) | file
    # The file destination is BOUNDED so it cannot grow forever. Used only when
    # output: file. A path is required; the bound knobs below have safe defaults
    # (a 0 means "use the default", not "unlimited" — the footprint stays bounded).
    # file:
    #   path: "/var/log/shoka/shoka.log"  # required; parent dirs are created
    #   max_size_mb: 100      # rotate the active file once it exceeds this (0 => 100)
    #   max_backups: 7        # rotated backups to keep (0 => 7)
    #   max_age_days: 30      # days to keep rotated backups (0 => 30)
    #   compress: false       # gzip rotated backups
    #   rotate_daily: true    # also rotate at least once per day even with no size
    #                         # pressure (default true; set false for size-only)

  # Static Bearer-token auth + WebSocket origin policy. As of B-50 this is NO
  # LONGER a global MCP gate — MCP access is decided per transport above. It now
  # governs: (1) the API-Token validated by server.mcp.plain.bearer_auth, and
  # (2) the Web UI / non-MCP endpoints (/ws/ui, /drafts/...). When disabled (the
  # default) those non-MCP endpoints require no token and accept all WS origins.
  auth:
    enabled: false
    # Accepted bearer tokens (constant-time compared). Also the token set the
    # plain MCP transport checks when its bearer_auth flag is on.
    # tokens:
    #   - "replace-with-a-long-random-token"
    # Permitted WebSocket `Origin` values for /ws/ui and /drafts when auth is on
    # (an empty/absent Origin is rejected).
    # allowed_origins:
    #   - "http://localhost:8080"

    # WebUI multi-user login (B-28 stage 1). The user DB lives at
    # <base_dir>/users.db (a go-git-free bbolt sibling of oauth.db). This is the
    # interactive human login for the Web UI — SEPARATE from the MCP OAuth token
    # surface (a session is an opaque cookie, never an OAuth token).
    users:
      # FIRST-RUN: with no users yet, the Web UI shows a zero-config setup wizard
      # and the first person to complete it becomes the wildcard admin (*:admin).
      # Default true = "usable right away" on docker run / apt install. A PUBLIC
      # deployment should set this false (in the same config it edits to expose the
      # server) to close the open-registration window; once an admin exists,
      # further users arrive only by invitation (a later stage).
      # allow_first_run_admin: true
      #
      # TOTP secrets are encrypted at rest. By default a random key is generated
      # once and persisted at <base_dir>/userstore.key. Set this to pin the key
      # (any string, hashed to 32 bytes) — e.g. to share the store across a rebuild.
      # totp_encryption_key: ""
      #
      # Login session lifetime (default 720h = 30 days).
      # session_ttl: "720h"

    # WebUI passkeys / WebAuthn (B-28 stage 1). Passkeys are the primary,
    # passwordless factor; password (+ optional TOTP) is the universal floor that
    # always works. Passkeys require a SECURE CONTEXT and a registrable-domain RP
    # ID — so they work on a public domain (HTTPS via a reverse proxy) and on
    # `localhost` (dev), but NOT on a bare internal IP (an IP cannot be a WebAuthn
    # RP ID — log in there with the password/TOTP floor). Leave rp_id EMPTY to
    # disable passkeys for this deployment (password+TOTP still works). These values
    # live ONLY here in config, never in source.
    webauthn:
      # rp_id: "docs.example.com"        # canonical registrable domain (or "localhost" for dev)
      # rp_display_name: "Shoka"
      # rp_origins:
      #   - "https://docs.example.com"   # permitted fully-qualified origin(s)

  # Operator-only diagnostics. OFF by default.
  debug:
    # Verbatim HTTP request/response dump (B-56/B-59). When true, EVERY request and EVERY
    # response on all three surfaces (web / mcp-plain / mcp-oauth) is logged in full —
    # method, path, ALL headers, the full body, and the status — at INFO, as a guaranteed
    # `http request dump` / `http response dump` pair with NO exception (boring,
    # unparseable, error, SSE — all of it), correlated by `request_id`.
    #
    # The dump is RAW and UNREDACTED (B-59): tokens, authorization codes,
    # code_verifier/code_challenge, the consent credential, and the Authorization header
    # value are dumped VERBATIM, like every other byte — no masking, no fingerprint. (The
    # earlier redaction was removed because it dropped the /token request dump.) So the
    # log contains LIVE SECRETS: this is a LOCAL debug switch you own — enable it, read
    # the log, turn it back off, and do not ship the log.
    #
    # Intended for connect/debug sessions, not steady-state: it logs full bodies. Enable
    # it, restart, and confirm via the startup line `startup http dump enabled=true`.
    # Default false.
    dump_http: false

# Commit-author identity. PROVISIONAL: this is "single-user mode" — the floor of
# a larger authentication design (maintenance backlog B-28), NOT that design.
# There is no authentication; `user` is the one operator Shoka records as the
# owner of every commit. MCP-connected agents declare their own name (via the
# MCP `initialize` clientInfo) and an optional worker id (via initialize `_meta`
# under key "shoka/worker-id"); `agent_default` is the fallback for clients that
# declare nothing. Identity is read at startup; change it and restart.
#
# Commit format: the agent is the git Author, `user` is the git Committer, and
# all three layers are also recorded as `Shoka-User` / `Shoka-Agent` /
# `Shoka-Worker` commit trailers (Shoka-Worker only when present).
identity:
  user:
    name: "Shoka Operator"           # your name
    email: "operator@shoka.local"    # your email
  agent_default:
    name: "shoka-agent"              # used when an MCP client declares no name
    worker: ""                       # default Rohrpost worker id (usually empty)

storage:
  # Project repositories live at <base_dir>/<namespace>/<projectName>.
  # Relative paths resolve against the server's working directory and are
  # created automatically on startup.
  base_dir: "./data"

  # Working-tree-vs-git drift detection. At startup (and optionally on an
  # interval) Shoka checks each project's working tree against its git HEAD and
  # marks projects healthy / corrupted / dangerous. Defaults shown.
  drift_scan:
    on_startup: true   # run a scan once at startup
    interval: 0        # 0 = no periodic re-scan; e.g. "5m" to enable

  # Lost+found worker. A periodic sweep that restores the "tracked-only working
  # tree" invariant: per healthy project, untracked files matching a
  # shoka.disposable pattern are deleted, the rest are moved to a per-project
  # lost+found area (<base_dir>/<namespace>/.shoka-lostfound/<project>/). It
  # never touches tracked files. shoka.disposable files (gitignore syntax, but a
  # DISTINCT concept — they declare files safe to delete, not files to hide) live
  # at <base_dir>/shoka.disposable, <base_dir>/<namespace>/shoka.disposable, and
  # <base_dir>/<namespace>/<project>.shoka.disposable, merged additively.
  # Defaults shown.
  lost_found:
    enabled: true      # set false to disable the worker (dev/debug)
    interval: 5m       # sweep cadence

  # Index repair worker (I1). A periodic sweep that reconciles each project's
  # derivative index store (<base_dir>/<namespace>/<project>.index.db) with git
  # HEAD, rebuilding it wholesale from working-tree bytes when stale, missing, or
  # corrupt. The index is a disposable cache; no query reads it yet (the full-text
  # and reverse-link fast paths arrive in later directives). Defaults shown.
  index:
    enabled: true      # set false to disable the worker (dev/debug)
    interval: 5m       # sweep cadence

  # Deleted-file log. A per-project store (<base_dir>/<namespace>/<project>.deleted.db)
  # of currently-deleted files, written at the commit funnel and used by the admin
  # "deleted files" view + the revive_file / list_deleted ops. There is deliberately
  # NO interval / background sweep: repair is LAZY, on two triggers only — the log is
  # absent (first use), or a revival finds its recorded commit gone from git — each
  # rebuilding from a BOUNDED recent-commit walk (never the full history). Defaults
  # shown; an absent block uses them.
  deleted_log:
    enabled: true       # set false to disable the deleted-file log + revive/list ops
    repair_depth: 50    # bounded rebuild-walk depth in commits (the stable since_last50 window)
    max_entries: 1000   # FIFO cap on remembered deletions (oldest evicted; 0 = unbounded)

  # OAuth dead-series cleaner. The OAuth token store has no other garbage
  # collection, so fully-dead token series (both the access AND refresh token
  # expired) would otherwise accumulate forever. This periodic sweep deletes a
  # series as soon as it is past its refresh-expiry — there is NO grace window
  # (B-71 Stage 5: expiry ⇒ immediately swept). Only runs when the OAuth transport
  # (server.mcp.oauth) is configured. Defaults shown.
  # NOTE (breaking change, B-71 Stage 5): the former `grace:` key was REMOVED. A
  # config that still sets oauth_cleaner.grace will FAIL to load (strict key
  # checking). Delete the line.
  oauth_cleaner:
    enabled: true      # set false to keep dead series (they show on the admin page)
    interval: 1h       # how often to sweep

# Per-file write lock manager. Reads take no lock; each write holds a per-file
# lock only across the check-and-write critical section. Defaults shown.
filelock:
  max_lease_duration: 5m   # a stale lease is reaped after this long
  reaper_interval: 1s

# Write-ahead log. Every write/delete is appended here before the background
# worker commits it to git. If the WAL backs up past max_entries, writes are
# refused (write-disabled mode) until it drains. Defaults shown.
wal:
  max_entries: 1000

# Background git-commit worker pool that drains the WAL. Per-project order is
# preserved; different projects commit concurrently. Defaults shown.
wal_worker:
  min_workers: 1
  max_workers: 8
  idle_timeout: 30s
  scan_interval: 100ms
  backoff_initial: 100ms
  backoff_max: 30s

# In-process notification center. Records recent storage activity
# (file.write / file.delete / project.create) in a bounded in-memory ring
# buffer for future consumers (Web UI auto-refresh, drift-rescan triggers).
# It is always constructed; setting max_entries: 1 effectively keeps only the
# latest event. No transport or subscriber API exists yet. Default shown.
notify:
  max_entries: 1000   # ring buffer size for the notification center

# Optional Prometheus metrics endpoint. Like the pprof endpoint (--profile-addr),
# it is off by default and forced to a loopback host when set.
metrics:
  addr: ""   # e.g. "localhost:9090" to enable /metrics

# Per-project catalog (the bbolt cache of Shoka-managed files at
# <base_dir>/<namespace>/<project>.db). Currently no tunable fields — bbolt
# defaults are used and the catalog is disposable (rebuilt from git when missing
# or unreadable). The section exists so future options can be added without
# invalidating the config schema.
catalog: {}

# Optional outbound webhooks. After each successful write/delete/project creation,
# Shoka POSTs a JSON body {event, namespace, project, path?, commit_hash?, timestamp}
# to every subscribed URL (best-effort, async, with one retry). If 'secret' is set,
# the request carries an X-Shoka-Signature header (hex HMAC-SHA256 of the body).
# webhooks:
#   - name: cloud-run-dispatcher
#     url: "https://example.com/shoka-hook"
#     events: [file_written, file_deleted, project_created]
#     secret: "shared-secret"

# Optional: ask_the_librarian (B-73). When configured, Shoka registers an
# `ask_the_librarian` MCP tool: an internal LLM reads a project's documents
# through read-only, root-confined, ignore-filtered tools and returns just the
# ANSWER, so a consulting agent's context is not filled by the corpus. The same
# keys select live Anthropic and a local-ollama debug path on ONE code path —
# they differ only in base_url, api_key, and model. Omit this block (or any of
# provider/model/api_key) to leave the tool unregistered. Read access to the
# target namespace/project is still required (it rides the authz middleware).
# llm:
#   provider: "anthropic"                 # the only provider today
#   base_url: ""                          # "" => live Anthropic; "http://localhost:11434" => local ollama
#   api_key: ""                           # a real Anthropic key live; "ollama" (accepted-but-ignored) for local
#   model: "claude-3-5-haiku-latest"      # live model; e.g. "Qwen3:1.7b-q4_K_M" for local ollama
#   max_steps: 8                          # tool-call loop budget (model round-trips); defaults to 8
